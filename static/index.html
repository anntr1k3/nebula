  <svg class="nebula-svg-filters" width="0" height="0" aria-hidden="true" focusable="false">
    <defs>
      <!-- Радиальная «линза»: искажение фона за стеклом (feDisplacementMap) -->
      <filter id="nebula-liquid-refract" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
        <feImage
          href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 256 256'%3E%3Cdefs%3E%3CradialGradient id='l' cx='50%25' cy='46%25' r='52%25'%3E%3Cstop offset='0%25' stop-color='%237a7a7a'/%3E%3Cstop offset='38%25' stop-color='%23828282'/%3E%3Cstop offset='58%25' stop-color='%236e6e6e'/%3E%3Cstop offset='78%25' stop-color='%23969696'/%3E%3Cstop offset='100%25' stop-color='%235a5a5a'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='256' height='256' fill='url(%23l)'/%3E%3C/svg%3E"
          result="lensMap"
          preserveAspectRatio="none" />
        <feDisplacementMap
          in="SourceGraphic"
          in2="lensMap"
          scale="16"
          xChannelSelector="R"
          yChannelSelector="G"
          result="refracted" />
        <feColorMatrix
          in="refracted"
          type="matrix"
          values="1.04 0 0 0 0  0 1.02 0 0 0  0 0 1.07 0 0  0 0 0 1 0" />
      </filter>
    </defs>
  </svg>
  <script>
    (function () {
      var boot = { ids: ['dark', 'dark-midnight', 'dark-forest', 'light', 'light-warm', 'light-frost'], meta: { dark: '#0c1220', 'dark-midnight': '#0a0614', 'dark-forest': '#050d0a', light: '#e8ecf4', 'light-warm': '#ebe4d8', 'light-frost': '#eef8ff' } }
      var el = document.getElementById('nebula-theme-bootstrap')
      if (el) {
        try {
          var p = JSON.parse(el.textContent)
          if (p.ids && p.meta) boot = p
        } catch (e) {}
      }
      var ids = boot.ids
      var colors = boot.meta
      var th = localStorage.getItem('theme') || 'dark'
      if (ids.indexOf(th) < 0) th = th === 'light' ? 'light' : 'dark'
      document.body.dataset.theme = th
      document.body.className = th.indexOf('light') === 0 ? 'light-theme' : 'dark-theme'
      var m = document.getElementById('meta-theme-color')
      if (m) m.setAttribute('content', colors[th] || '#0c1220')
      try {
        if (localStorage.getItem('lowVision') === '1') document.documentElement.classList.add('low-vision')
      } catch (e) {}
    })()

        <h2 id="modal-profile-title" data-i18n="profileModalTitle"></h2>
        <label class="settings-label" for="profile-nickname" data-i18n="profileNickname"></label>
        <input id="profile-nickname" type="text" class="glass-input" maxlength="64" autocomplete="off">
        <label class="settings-label" for="profile-bio" data-i18n="profileBio"></label>
        <textarea id="profile-bio" class="glass-input glass-textarea" rows="3" maxlength="500"></textarea>
        <label class="settings-label" data-i18n="profileAvatar"></label>
        <div class="profile-avatar-editor">
          <div id="profile-avatar-preview" class="profile-avatar-preview" aria-hidden="true"></div>
          <div class="profile-avatar-actions">
            <input
              id="profile-avatar-file"
              type="file"
              class="visually-hidden"
              accept="image/jpeg,image/png,image/webp,image/gif,.jpg,.jpeg,.png,.webp,.gif"
            />
            <button type="button" id="btn-profile-avatar-upload" class="glass-button-secondary" data-i18n="avatarChooseFile"></button>
            <button type="button" id="btn-profile-avatar-clear" class="glass-button-secondary" hidden data-i18n="avatarRemoveImage"></button>
          </div>
        </div>
        <p class="profile-avatar-hint settings-hint" data-i18n="profileAvatarHint"></p>
        <div id="profile-emoji-wrap">
          <div class="settings-label" id="profile-avatar-label" data-i18n="profileAvatarEmoji"></div>
          <div
            id="profile-avatar"
            class="glass-input profile-avatar-emoji-field"
            contenteditable="true"
            role="textbox"
            aria-labelledby="profile-avatar-label"
            aria-multiline="false"
            spellcheck="false"
            data-i18n-placeholder="profileAvatarEmoji"
            data-empty="true"
          ></div>
        </div>
        <div class="modal-buttons modal-buttons--profile-compact">
          <button type="button" class="glass-button" id="btn-save-profile" data-i18n="saveProfile"></button>
          <button type="button" class="glass-button-secondary" id="btn-profile-modal-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>

    <div id="modal-app-settings" class="modal modal--smooth" hidden role="dialog" aria-modal="true" aria-labelledby="modal-app-settings-title">
      <div class="modal-content liquid-modal-card settings-modal-card">
        <h2 id="modal-app-settings-title" data-i18n="settingsModalTitle"></h2>
        <p class="settings-modal-hint" data-i18n="settingsModalHint"></p>

        <h3 id="settings-lang-heading" class="settings-section-title" data-i18n="languageLabel"></h3>
        <div class="theme-selector settings-lang-row" role="group" aria-labelledby="settings-lang-heading">
          <button type="button" class="language-option" data-locale="en">EN</button>
          <button type="button" class="language-option" data-locale="ru">RU</button>
        </div>

        <h3 id="settings-theme-heading" class="settings-section-title" data-i18n="appearanceAria"></h3>
        <p class="settings-theme-family" data-i18n="darkTheme"></p>
        <div class="theme-selector settings-theme-row" role="group" aria-labelledby="settings-theme-heading">
          <button type="button" class="theme-option" data-theme="dark" data-i18n="themeDarkNebula"></button>
          <button type="button" class="theme-option" data-theme="dark-midnight" data-i18n="themeDarkMidnight"></button>
          <button type="button" class="theme-option" data-theme="dark-forest" data-i18n="themeDarkForest"></button>
        </div>
        <p class="settings-theme-family" data-i18n="lightTheme"></p>
        <div class="theme-selector settings-theme-row">
          <button type="button" class="theme-option" data-theme="light" data-i18n="themeLightDay"></button>
          <button type="button" class="theme-option" data-theme="light-warm" data-i18n="themeLightWarm"></button>
          <button type="button" class="theme-option" data-theme="light-frost" data-i18n="themeLightFrost"></button>
        </div>

        <h3 class="settings-section-title" data-i18n="accessibilityTitle"></h3>
        <button
          type="button"
          id="btn-lowvision-toggle"
          class="accessibility-toggle"
          data-lowvision-toggle
          aria-pressed="false"
        >
          <span class="accessibility-toggle-icon" aria-hidden="true">
            <svg class="lowvision-glyph" viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <circle cx="12" cy="7.4" r="1.5" fill="currentColor" stroke="none"></circle>
              <path d="M6.5 10.2 H17.5 M12 10.2 V15 M12 15 L9.5 19 M12 15 L14.5 19"></path>
            </svg>
          </span>
          <span class="accessibility-toggle-label" data-i18n="lowVisionLabel"></span>
          <span class="accessibility-toggle-state" data-i18n="lowVisionOff" aria-hidden="true"></span>
        </button>
        <p class="settings-modal-hint" data-i18n="lowVisionHint"></p>

        <h3 class="settings-section-title" data-i18n="blockedUsers"></h3>
        <div class="settings-modal-block-stack">
          <input id="block-username-input" type="text" class="glass-input" data-i18n-placeholder="blockUserHint" autocomplete="off">
          <button type="button" class="glass-button glass-button--danger settings-modal-stacked-btn" id="btn-block-user" data-i18n="blockButton"></button>
          <button type="button" class="glass-button-secondary settings-modal-stacked-btn" id="btn-app-settings-done" data-i18n="closeButton"></button>
        </div>
        <div id="blocked-list" class="blocked-list"></div>
      </div>
    </div>

    <div id="modal-create-room" class="modal modal--smooth" hidden role="dialog" aria-modal="true" aria-labelledby="modal-create-room-title">
      <div class="modal-content liquid-modal-card">
        <h2 id="modal-create-room-title" data-i18n="createGroupTitle"></h2>
        <input id="new-room-name" type="text" class="glass-input" data-i18n-placeholder="groupNamePlaceholder">
        <div class="members-selection">
          <h3 data-i18n="selectMembers"></h3>
          <input id="members-search" type="search" class="glass-input members-filter-input" data-i18n-placeholder="membersFilterPlaceholder" autocomplete="off">
          <div id="members-list" class="members-list"></div>
        </div>
        <div class="modal-buttons">
          <button type="button" class="glass-button" id="btn-create-room-submit" data-i18n="createButton"></button>
          <button type="button" class="glass-button-secondary" id="btn-create-room-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>

    <div id="ttl-popover" class="composer-float composer-float--ttl" hidden role="listbox" aria-labelledby="ttl-select-trigger"></div>

    <div
      id="schedule-popover"
      class="composer-float composer-float--schedule"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="schedule-popover-title"
    >
      <div class="composer-float-header" id="schedule-popover-title">
        <i class="fa-solid fa-clock" aria-hidden="true"></i>
        <span data-i18n="scheduleSendTitle"></span>
      </div>
      <label class="composer-float-label" for="schedule-datetime-input"><span data-i18n="scheduleDatetimeLabel"></span></label>
      <input type="datetime-local" id="schedule-datetime-input" class="glass-input composer-float-input" />
      <div class="composer-float-actions composer-float-actions--schedule">
        <button type="button" class="glass-button" id="schedule-confirm" data-i18n="scheduleConfirm"></button>
        <button type="button" class="glass-button-secondary" id="schedule-cancel" data-i18n="cancelButton"></button>
      </div>
    </div>

    <div
      id="ai-assist-popover"
      class="composer-float composer-float--ai"
      hidden
      role="listbox"
      aria-labelledby="btn-ai-assist"
    ></div>

    <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

    <div id="connection-banner" class="connection-banner" hidden role="status" aria-live="polite">
      <span class="connection-banner-dot" aria-hidden="true"></span>
      <span class="connection-banner-text"></span>
    </div>

    <div
      id="modal-e2ee-key"
      class="modal modal--smooth"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-e2ee-key-title"
      aria-describedby="modal-e2ee-key-desc"
    >
      <div class="modal-content liquid-modal-card e2ee-modal-card">
        <h2 id="modal-e2ee-key-title" data-i18n="e2eeModalTitle"></h2>
        <p id="modal-e2ee-key-desc" class="settings-modal-hint" data-i18n="e2eeModalIntro"></p>
        <ul class="e2ee-help-list">
          <li data-i18n="e2eeHelpAutoCreate"></li>
          <li data-i18n="e2eeHelpShare"></li>
          <li data-i18n="e2eeHelpNoServer"></li>
          <li data-i18n="e2eeHelpStorage"></li>
        </ul>
        <label class="composer-float-label" for="e2ee-key-input">
          <span data-i18n="e2eeKeyInputLabel"></span>
        </label>
        <textarea
          id="e2ee-key-input"
          class="glass-input e2ee-key-input"
          rows="3"
          spellcheck="false"
          autocomplete="off"
          data-i18n-placeholder="e2eeKeyInputPlaceholder"
        ></textarea>
        <div id="e2ee-generated-wrap" class="e2ee-generated-wrap" hidden>
          <label class="composer-float-label" for="e2ee-generated-key">
            <span data-i18n="e2eeGeneratedKeyLabel"></span>
          </label>
          <textarea
            id="e2ee-generated-key"
            class="glass-input e2ee-key-output"
            rows="2"
            readonly
            spellcheck="false"
          ></textarea>
          <p class="settings-modal-hint e2ee-generated-hint" data-i18n="e2eeGeneratedKeyHint"></p>
        </div>
        <div class="modal-buttons e2ee-modal-buttons">
          <button type="button" class="glass-button" id="btn-e2ee-save" data-i18n="e2eeSaveOrCreate"></button>
          <button type="button" class="glass-button-secondary" id="btn-e2ee-copy" data-i18n="e2eeCopyCurrent"></button>
          <button type="button" class="glass-button-secondary" id="btn-e2ee-remove" data-i18n="e2eeRemoveKey"></button>
          <button type="button" class="glass-button-secondary" id="btn-e2ee-close" data-i18n="closeButton"></button>
        </div>
      </div>
    </div>

    <div
      id="modal-delete-message"
      class="modal modal--smooth"
      hidden
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="modal-delete-message-title"
      aria-describedby="modal-delete-message-desc"
    >
      <div class="modal-content liquid-modal-card">
        <h2 id="modal-delete-message-title" data-i18n="deleteMessageModalTitle"></h2>
        <p id="modal-delete-message-desc" class="settings-modal-hint" data-i18n="deleteMessageModalBody"></p>
        <div class="modal-buttons">
          <button type="button" class="glass-button glass-button--danger" id="btn-delete-message-confirm" data-i18n="deleteMessageConfirm"></button>
          <button type="button" class="glass-button-secondary" id="btn-delete-message-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>

    <div
      id="modal-report-message"
      class="modal modal--smooth"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-report-message-title"
    >
      <div class="modal-content liquid-modal-card">
        <h2 id="modal-report-message-title" data-i18n="reportMessageModalTitle"></h2>
        <p class="settings-modal-hint" data-i18n="reportMessageModalBody"></p>
        <textarea
          id="report-message-input"
          class="glass-input edit-message-textarea"
          rows="4"
          data-i18n-placeholder="reportReasonPrompt"
        ></textarea>
        <div class="modal-buttons">
          <button type="button" class="glass-button glass-button--danger" id="btn-report-message-confirm" data-i18n="reportMessageSubmit"></button>
          <button type="button" class="glass-button-secondary" id="btn-report-message-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>

    <div
      id="modal-pinned-list"
      class="modal modal--smooth"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-pinned-list-title"
    >
      <div class="modal-content liquid-modal-card modal-pinned-card">
        <h2 id="modal-pinned-list-title" data-i18n="pinnedListModalTitle"></h2>
        <div id="pinned-modal-list" class="pinned-modal-list" role="list"></div>
        <div class="modal-buttons">
          <button type="button" class="glass-button-secondary" id="btn-pinned-list-close" data-i18n="closeButton"></button>
        </div>
      </div>
    </div>

    <div
      id="modal-edit-message"
      class="modal modal--smooth"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-edit-message-title"
    >
      <div class="modal-content liquid-modal-card">
        <h2 id="modal-edit-message-title" data-i18n="editMessageModalTitle"></h2>
        <textarea
          id="edit-message-input"
          class="glass-input edit-message-textarea"
          rows="4"
          data-i18n-placeholder="editMessagePlaceholder"
        ></textarea>
        <div class="edit-ai-section edit-ai-section--off" id="edit-ai-section">
          <p class="edit-ai-label" data-i18n="aiAssistInEdit"></p>
          <div id="edit-ai-toolbar" class="edit-ai-toolbar" role="group" data-i18n-aria="aiAssistTitle"></div>
        </div>
        <div class="modal-buttons">
          <button type="button" class="glass-button" id="btn-edit-message-confirm" data-i18n="saveEdit"></button>
          <button type="button" class="glass-button-secondary" id="btn-edit-message-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>


    <div
      id="modal-scheduled-list"
      class="modal modal--smooth"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-scheduled-list-title"
    >
      <div class="modal-content liquid-modal-card modal-scheduled-card">
        <h2 id="modal-scheduled-list-title" data-i18n="scheduledListModalTitle"></h2>
        <div id="scheduled-list" class="scheduled-list" role="list"></div>
        <p id="scheduled-list-empty" class="scheduled-list-empty settings-modal-hint" hidden data-i18n="scheduledListEmpty"></p>
        <div class="modal-buttons">
          <button type="button" class="glass-button-secondary" id="btn-scheduled-list-close" data-i18n="closeButton"></button>
        </div>
      </div>
    </div>

    <div
      id="modal-edit-scheduled"
      class="modal modal--smooth"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-edit-scheduled-title"
    >
      <div class="modal-content liquid-modal-card">
        <h2 id="modal-edit-scheduled-title" data-i18n="editScheduledModalTitle"></h2>
        <textarea
          id="edit-scheduled-input"
          class="glass-input edit-message-textarea"
          rows="4"
          data-i18n-placeholder="editMessagePlaceholder"
        ></textarea>
        <label class="composer-float-label" for="edit-scheduled-datetime"
          ><span data-i18n="scheduleDatetimeLabel"></span
        ></label>
        <input type="datetime-local" id="edit-scheduled-datetime" class="glass-input composer-float-input" />
        <div class="modal-buttons">
          <button type="button" class="glass-button" id="btn-edit-scheduled-confirm" data-i18n="saveEdit"></button>
          <button type="button" class="glass-button-secondary" id="btn-edit-scheduled-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>

    <div
      id="modal-delete-scheduled"
      class="modal modal--smooth"
      hidden
      role="alertdialog"
      aria-modal="true"
      aria-labelledby="modal-delete-scheduled-title"
      aria-describedby="modal-delete-scheduled-desc"
    >
      <div class="modal-content liquid-modal-card">
        <h2 id="modal-delete-scheduled-title" data-i18n="deleteScheduledModalTitle"></h2>
        <p id="modal-delete-scheduled-desc" class="settings-modal-hint" data-i18n="deleteScheduledModalBody"></p>
        <div class="modal-buttons">
          <button type="button" class="glass-button glass-button--danger" id="btn-delete-scheduled-confirm" data-i18n="deleteMessageConfirm"></button>
          <button type="button" class="glass-button-secondary" id="btn-delete-scheduled-cancel" data-i18n="cancelButton"></button>
        </div>
      </div>
    </div>

    <div id="ctx-menu" class="ctx-menu" hidden role="menu"></div>
    <div id="emoji-picker-backdrop" class="emoji-picker-backdrop" hidden aria-hidden="true"></div>
    <div id="emoji-bar" class="emoji-bar" hidden role="toolbar"></div>
    <div
      id="emoji-picker-expanded"
      class="emoji-picker-expanded"
      hidden
      role="dialog"
      aria-modal="true"
      data-i18n-aria="emojiPickerTitle"
    ></div>
  </div>

  <div
    id="media-viewer"
    class="media-viewer"
    hidden
    role="dialog"
    aria-modal="true"
  >
    <button type="button" class="media-viewer__close" id="media-viewer-close" aria-keyshortcuts="Escape">
      <i class="fa-solid fa-xmark" aria-hidden="true"></i>
    </button>
    <div class="media-viewer__stage"></div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script type="module" src="/js/app.js?v=nebula-14"></script>
</body>
